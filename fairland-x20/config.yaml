name: "Fairland X20"
description: "Fairland X20 Pool Heat Pump integration via Modbus TCP and MQTT Discovery"
version: "0.1.0"
slug: "fairland_x20"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
url: "https://github.com/uk05de/ha-fairland-x20"
startup: services
init: false
options:
  modbus_host: "192.168.2.100"
  modbus_port: 502
  modbus_slave: 1
  scan_interval: 30
  message_delay_ms: 200
  mqtt_host: "192.168.2.158"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  loglevel: "INFO"
schema:
  modbus_host: str
  modbus_port: int
  modbus_slave: int
  scan_interval: int
  message_delay_ms: int
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  loglevel: list(INFO|DEBUG|ERROR)
